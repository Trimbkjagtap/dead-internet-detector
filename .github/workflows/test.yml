name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Create required data directories
        run: |
          mkdir -p data/reports models

      - name: Run integration tests
        env:
          # Point to dummy values — tests mock all external APIs
          NEO4J_URI: "bolt://localhost:7687"
          NEO4J_USER: "neo4j"
          NEO4J_PASSWORD: "test"
          OPENAI_API_KEY: ""
          IPINFO_TOKEN: ""
          WHOIS_API_KEY: ""
        run: |
          python -m pytest tests/test_pipeline.py tests/test_confidence.py -v --tb=short --timeout=60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            data/reports/
          retention-days: 7
